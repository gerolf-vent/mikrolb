name: Publish container image

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write
  id-token: none

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: manifest
        run: |
          set -euo pipefail

          wget -qO ./build/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x ./build/yq

          IMAGE_NAME="$(./build/yq eval '.package.name' ./build/melange.yaml)"

          VERSION_FULL="${GITHUB_REF_NAME#v}"
          EPOCH="0"
          if [[ "$VERSION_FULL" =~ ^(.+)-r([0-9]+)$ ]]; then
            VERSION_FULL="${BASH_REMATCH[1]}"
            EPOCH="${BASH_REMATCH[2]}"
          fi

          if [[ ! "$VERSION_FULL" =~ ^([0-9]+\.[0-9]+\.[0-9]+)([.-].*)?$ ]]; then
            echo "Unsupported tag format: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          VERSION_3="${BASH_REMATCH[1]}"
          VERSION_1="$(echo "$VERSION_3" | cut -d. -f1)"
          VERSION_2="$VERSION_1.$(echo "$VERSION_3" | cut -d. -f2)"

          VERSION="$VERSION_3" EPOCH="$EPOCH" ./build/yq eval -i '.package.version = strenv(VERSION) | .package.epoch = (strenv(EPOCH) | tonumber)' ./build/melange.yaml

          echo "version_full=${VERSION_FULL}-r${EPOCH}" >> $GITHUB_OUTPUT
          echo "version=$VERSION_FULL" >> $GITHUB_OUTPUT
          echo "version_3=$VERSION_3" >> $GITHUB_OUTPUT
          echo "version_2=$VERSION_2" >> $GITHUB_OUTPUT
          echo "version_1=$VERSION_1" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
      - uses: chainguard-dev/actions/melange-build@v1.6.13
        id: melange
        with:
          archs: x86_64
          config: ./build/melange.yaml
          sign-with-temporary-key: true
          signing-key-path: ./build/melange.rsa
          repository-path: ./build/packages
          source-dir: ${{ github.workspace }}
      - uses: chainguard-images/actions/apko-publish@v1.0.22
        id: apko
        with:
          archs: amd64
          config: ./build/apko.yaml
          tag: "ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:${{ steps.manifest.outputs.version_full }} ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:${{ steps.manifest.outputs.version }} ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:${{ steps.manifest.outputs.version_3 }} ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:${{ steps.manifest.outputs.version_2 }} ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:${{ steps.manifest.outputs.version_1 }} ghcr.io/${{ github.repository_owner }}/${{ steps.manifest.outputs.image_name }}:latest"
          keyring-append: ./build/melange.rsa.pub
