---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: mikrolb-ippool-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: mikrolb-system/mikrolb-webhook
webhooks:
- name: vippool.mikrolb.de
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  matchPolicy: Equivalent
  timeoutSeconds: 10
  clientConfig:
    service:
      namespace: mikrolb-system
      name: mikrolb-webhook
      path: /validate-mikrolb-de-v1alpha1-ippool
      port: 443
  rules:
  - apiGroups:
    - mikrolb.de
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - ippools
    scope: Cluster
