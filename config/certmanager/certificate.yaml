---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mikrolb-webhook
  namespace: mikrolb-system
spec:
  secretName: mikrolb-webhook-tls
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: mikrolb-webhook-selfsigned
  dnsNames:
  - mikrolb-webhook.NAMESPACE.svc
  - mikrolb-webhook.NAMESPACE.svc.cluster.local
